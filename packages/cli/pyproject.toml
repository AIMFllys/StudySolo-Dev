[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "studysolo-cli"
version = "0.1.0"
description = "StudySolo command-line client. Inspect account, usage, workflows and trigger runs from your terminal."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "StudySolo" }]
keywords = ["studysolo", "cli", "workflow", "ai"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "typer>=0.12,<1.0",
    "rich>=13.7",
    "httpx>=0.27",
    "pydantic>=2.7",
    "tomli-w>=1.0; python_version < '3.11'",
]

[project.scripts]
studysolo = "studysolo_cli.__main__:main"

[project.urls]
Homepage = "https://github.com/studysolo/StudySolo"
Issues = "https://github.com/studysolo/StudySolo/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/studysolo_cli"]
