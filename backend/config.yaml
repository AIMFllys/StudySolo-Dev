# StudySolo AI 运行时配置中心
# 说明：
# 1. YAML 只负责运行时路由策略，不再承担模型目录与价格中心职责。
# 2. 模型目录、价格、可见性、tier gating 统一由 Supabase ai_model_families / ai_model_skus 维护。
# 3. $ENV_A|ENV_B 表示兼容旧环境变量别名，config_loader.py 会按顺序解析。

providers:
  dashscope:
    display_name: "阿里云百炼"
    role: "native"
    base_url: "$DASHSCOPE_BASE_URL"
    api_key: "$DASHSCOPE_API_KEY"

  deepseek:
    display_name: "DeepSeek 官方"
    role: "native"
    base_url: "$DEEPSEEK_BASE_URL"
    api_key: "$DEEPSEEK_API_KEY"

  moonshot:
    display_name: "月之暗面"
    role: "native"
    base_url: "$MOONSHOT_BASE_URL"
    api_key: "$MOONSHOT_API_KEY"

  volcengine:
    display_name: "火山引擎"
    role: "native"
    base_url: "$VOLCENGINE_BASE_URL"
    api_key: "$VOLCENGINE_API_KEY"

  zhipu:
    display_name: "智谱 AI"
    role: "native"
    base_url: "$ZHIPU_BASE_URL"
    api_key: "$ZHIPU_API_KEY"

  qiniu:
    display_name: "七牛云"
    role: "proxy"
    base_url: "$QINIU_BASE_URL"
    api_key: "$QINIU_AI_API_KEY|QINIU_API_KEY"

  siliconflow:
    display_name: "硅基流动"
    role: "proxy"
    base_url: "$SILICONFLOW_BASE_URL"
    api_key: "$SILICONFLOW_API_KEY"

  compshare:
    display_name: "优云智算"
    role: "proxy"
    base_url: "$COMPSHARE_BASE_URL|YOUYUN_BASE_URL"
    api_key: "$COMPSHARE_API_KEY|YOUYUN_API_KEY"

task_routes:
  trigger_input:
    routing_policy: "native_first"
    sku_ids:
      - "sku_dashscope_qwen_turbo_native"
      - "sku_deepseek_chat_native"
      - "sku_volcengine_doubao_pro_32k_native"

  ai_analyzer:
    routing_policy: "native_first"
    sku_ids:
      - "sku_dashscope_qwen_turbo_native"
      - "sku_deepseek_chat_native"
      - "sku_volcengine_doubao_pro_32k_native"

  ai_planner:
    routing_policy: "native_first"
    sku_ids:
      - "sku_dashscope_qwen_turbo_native"
      - "sku_deepseek_chat_native"
      - "sku_volcengine_doubao_pro_32k_native"

  flashcard:
    routing_policy: "native_first"
    sku_ids:
      - "sku_dashscope_qwen_turbo_native"
      - "sku_deepseek_chat_native"
      - "sku_volcengine_doubao_pro_32k_native"

  quiz_gen:
    routing_policy: "native_first"
    sku_ids:
      - "sku_dashscope_qwen_turbo_native"
      - "sku_deepseek_chat_native"
      - "sku_volcengine_doubao_pro_32k_native"

  logic_switch:
    routing_policy: "native_first"
    sku_ids:
      - "sku_dashscope_qwen_turbo_native"
      - "sku_deepseek_chat_native"

  outline_gen:
    routing_policy: "native_first"
    sku_ids:
      - "sku_deepseek_reasoner_native"
      - "sku_dashscope_qwen_plus_native"
      - "sku_volcengine_doubao_pro_256k_native"

  content_extract:
    routing_policy: "native_first"
    sku_ids:
      - "sku_deepseek_reasoner_native"
      - "sku_dashscope_qwen_plus_native"
      - "sku_volcengine_doubao_pro_256k_native"

  summary:
    routing_policy: "native_first"
    sku_ids:
      - "sku_deepseek_reasoner_native"
      - "sku_dashscope_qwen_plus_native"
      - "sku_volcengine_doubao_pro_256k_native"

  merge_polish:
    routing_policy: "proxy_first"
    sku_ids:
      - "sku_qiniu_kimi_k2_5_proxy"
      - "sku_moonshot_v1_128k_native"

  compare:
    routing_policy: "native_first"
    sku_ids:
      - "sku_deepseek_reasoner_native"
      - "sku_dashscope_qwen_plus_native"

  chat_response:
    routing_policy: "native_first"
    sku_ids:
      - "sku_deepseek_reasoner_native"
      - "sku_dashscope_qwen_plus_native"
      - "sku_volcengine_doubao_pro_256k_native"

  premium_chat:
    routing_policy: "proxy_first"
    sku_ids:
      - "sku_qiniu_qwen3_max_proxy"
      - "sku_siliconflow_qwen_72b_proxy"
      - "sku_dashscope_qwen_max_native"

  search:
    routing_policy: "capability_fixed"
    sku_ids:
      - "sku_qiniu_search_primary"
      - "sku_zhipu_search_expansion"

  ocr:
    routing_policy: "capability_fixed"
    sku_ids:
      - "sku_zhipu_glm_ocr_native"

compatibility:
  provider_aliases:
    youyun: "compshare"

engine:
  timeout_ms: 30000
  max_retries: 3
  max_nodes_per_workflow: 12
  json_validation_retries: 3
