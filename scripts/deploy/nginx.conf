server
{
    listen 80;
    listen 443 ssl;
    listen 443 quic;
    http2 on;
    server_name studyflow.1037solo.com;
    index index.html index.htm default.htm default.html;
    include /www/server/panel/vhost/nginx/extension/StudySolo-frontend/*.conf;
    #root /www/wwwroot/studyflow.1037solo.com/frontend;

    #CERT-APPLY-CHECK--START
    # з”ЁдәҺSSLиҜҒд№Ұз”іиҜ·ж—¶зҡ„ж–Үд»¶йӘҢиҜҒзӣёе…ій…ҚзҪ® -- иҜ·еӢҝеҲ йҷӨ
    include /www/server/panel/vhost/nginx/well-known/StudySolo-frontend.conf;
    #CERT-APPLY-CHECK--END

    #SSL-START SSLзӣёе…ій…ҚзҪ®
    #error_page 404/404.html;
    ssl_certificate    /www/server/panel/vhost/cert/StudySolo-frontend/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/StudySolo-frontend/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    add_header Alt-Svc 'quic=":443"; h3=":443"; h3-29=":443"; h3-27=":443";h3-25=":443"; h3-T050=":443"; h3-Q050=":443";h3-Q049=":443";h3-Q048=":443"; h3-Q046=":443"; h3-Q043=":443"';
    error_page 497 https://$host$request_uri;
    #HTTP_TO_HTTPS_START
    if ($server_port !~ 443){
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    #HTTP_TO_HTTPS_END
    #SSL-END

    #ERROR-PAGE-START  й”ҷиҜҜйЎөзӣёе…ій…ҚзҪ®
    #error_page 404 /404.html;
    #error_page 502 /502.html;
    #ERROR-PAGE-END

    #REWRITE-START дјӘйқҷжҖҒзӣёе…ій…ҚзҪ®
    include /www/server/panel/vhost/rewrite/node_StudySolo-frontend.conf;
    #REWRITE-END

    #зҰҒжӯўи®ҝй—®зҡ„ж–Үд»¶жҲ–зӣ®еҪ•
    location ~ ^/(\.user\.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README\.md|package\.json|package-lock\.json|\.env) {
        return 404;
    }

    #дёҖй”®з”іиҜ·SSLиҜҒд№ҰйӘҢиҜҒзӣ®еҪ•зӣёе…іи®ҫзҪ®
    location /.well-known/ {
        root /www/wwwroot/studyflow.1037solo.com/frontend;
    }

    #зҰҒжӯўеңЁиҜҒд№ҰйӘҢиҜҒзӣ®еҪ•ж”ҫе…Ҙж•Ҹж„ҹж–Үд»¶
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    # HTTPеҸҚеҗ‘д»ЈзҗҶзӣёе…ій…ҚзҪ®ејҖе§Ӣ >>>
    location ~ /purge(/.*) {
        proxy_cache_purge cache_one $host$request_uri$is_args$args;
    }

    # Backend API -> FastAPI
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:2038;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_http_version 1.1;
    }

    # Introduce SPA
    location = /introduce {
        return 301 /introduce/;
    }

    location = /introduce/ {
        root /www/wwwroot/studyflow.1037solo.com/introduce/dist;
        try_files /index.html =404;
    }

    location ^~ /introduce/assets/ {
        rewrite ^/introduce/(.*)$ /$1 break;
        root /www/wwwroot/studyflow.1037solo.com/introduce/dist;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    location ^~ /introduce/images/ {
        rewrite ^/introduce/(.*)$ /$1 break;
        root /www/wwwroot/studyflow.1037solo.com/introduce/dist;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location = /introduce/StudySolo.png {
        root /www/wwwroot/studyflow.1037solo.com/introduce/dist;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files /StudySolo.png =404;
    }

    location = /introduce/vite.svg {
        root /www/wwwroot/studyflow.1037solo.com/introduce/dist;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files /vite.svg =404;
    }

    location ^~ /introduce/ {
        rewrite ^/introduce/(.*)$ /$1 break;
        root /www/wwwroot/studyflow.1037solo.com/introduce/dist;
        try_files $uri $uri/ @introduce_spa;
    }

    location @introduce_spa {
        root /www/wwwroot/studyflow.1037solo.com/introduce/dist;
        try_files /index.html =404;
    }

    # Next.js hashed static assets вҖ” long-term immutable cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:2037;
        proxy_http_version 1.1;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Main Next app вҖ” NO cache for HTML/RSC responses
    location / {
        proxy_pass http://127.0.0.1:2037;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header REMOTE-HOST $remote_addr;
        proxy_set_header X-Host $host:$server_port;
        proxy_set_header X-Scheme $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 86400s;
        proxy_send_timeout 30s;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Disable proxy cache for HTML pages вҖ” ensures fresh content after each deploy
        proxy_cache off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
    }
    # HTTPеҸҚеҗ‘д»ЈзҗҶзӣёе…ій…ҚзҪ®з»“жқҹ <<<

    access_log  /www/wwwlogs/StudySolo-frontend.log;
    error_log  /www/wwwlogs/StudySolo-frontend.error.log;
}
